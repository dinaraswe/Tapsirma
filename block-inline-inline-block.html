<!DOCTYPE html>
<html>
    <head>
        <title>Tapsirmalar:</title>
        <style>
            a{
                display: block;
            }
            li{
                display: inline-block;
            }
        </style>
    </head>
    <body>
        <!-- Tapsirma - 1 -->
        <a href="#">Telegram</a>
        <a href="#">YouTube</a>
        <a href="#">Instagram</a>
        <!-- Tapsirma - 2 -->
        <p>
            I <span style="display: inline-block; width: 100px; background-color: green;">Love</span> Taxtakopir
        </p>
        <!-- Tapsirma - 3 -->
        <h4>Miyweler</h4>
        <ol>
            <li>Alma</li>
            <li>Banan</li>
            <li>Juzim</li>
        <!-- Tapsirma - 4 -->
        <!-- Soraw: Tómendegi teglerden qaysı biri jana qatardan baslanadı hám blok element
esaplanadı?
a. <a>, <span>, <p>, <b> 
Duris jawap: <p> -->
        <!-- Tapsirma - 5 -->
        <h1 style="display: inline;">Hello</h1>
        <a href="#" style="display: inline;">YouTube</a>
        <p style="display: inline;">Salem</p>
        <button style="display: inline;">SEBET</button>
        <span style="display: inline;">30$</span>
        <!-- Tapsirma - 6 -->
        <!-- Soraw: Dizim elementleri (li) block element pe yamasa inline?
Olarga kenlik (width) beriw mumkin be? 
Duris jawap: (li) block element olarga (width) beriwge boladi.-->
    </body>
</html>
